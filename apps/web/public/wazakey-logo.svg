<svg width="256" height="256" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="WazaKey logo">
  <defs>
    <linearGradient id="wkGrad" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D8C0" />
      <stop offset="1" stop-color="#0EA5A8" />
    </linearGradient>
  </defs>

  <!-- Outer badge -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#wkGrad)" />

  <!-- Keycap plate -->
  <rect
    x="10"
    y="10"
    width="44"
    height="44"
    rx="10"
    fill="#06231F"
    fill-opacity="0.18"
    stroke="#E7EAF0"
    stroke-opacity="0.26"
    stroke-width="1.5"
  />

  <!-- Waza mark: stylized W for legibility in small sizes -->
  <path
    d="M17 24L23 40L31 28L39 40L45 24"
    stroke="#F3F7FA"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Key cue -->
  <circle cx="46.5" cy="45.5" r="3" fill="#06231F" fill-opacity="0.7" />
